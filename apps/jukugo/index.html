<script>

/* ================================================
   backup.js インライン（v2）
   依存: points.js / records.js / APP_CONFIG
   方針:
   - ポイントは全アプリ共通で復元
   - 記録・重点問題はアプリごと
   - バックアップ全体は learning_apps_backup_archive に保管
   ================================================ */

function backupData() {
  // 1. 現在開いているアプリの最新データを保管庫に反映
  if (typeof saveCurrentAppDataToArchive === 'function') {
    saveCurrentAppDataToArchive();
  }

  // 2. 保管庫全体を取得
  const archive = typeof loadBackupArchive === 'function'
    ? loadBackupArchive()
    : {
        backupType : 'learning_apps_backup',
        version    : 2,
        exportedAt : new Date().toISOString(),
        shared     : {},
        apps       : {}
      };

  // 3. 共通ポイントを必ず最新化
  archive.backupType = 'learning_apps_backup';
  archive.version    = 2;
  archive.exportedAt = new Date().toISOString();
  archive.shared     = archive.shared || {};
  archive.apps       = archive.apps || {};

  if (typeof loadPoints === 'function') {
    archive.shared.points = loadPoints();
  }

  // 4. 現在のアプリ分を必ず入れる
  archive.apps[APP_CONFIG.appId] = {
    records: loadRecords(),
    focus  : loadFocus(),
    wrong  : (typeof loadWrongItems === 'function') ? loadWrongItems() : []
  };

  // 5. JSONとして保存
  const now = new Date();
  const p   = n => String(n).padStart(2, '0');
  const ds  = `${now.getFullYear()}${p(now.getMonth() + 1)}${p(now.getDate())}`;

  const blob = new Blob(
    [JSON.stringify(archive, null, 2)],
    { type: 'application/json' }
  );

  const url = URL.createObjectURL(blob);
  const a   = document.createElement('a');

  a.href = url;
  a.download = `learning_apps_backup_${ds}.json`;
  a.click();

  URL.revokeObjectURL(url);
}

function restoreData(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = e => {
    let data;

    try {
      data = JSON.parse(e.target.result);

      // v2形式
      const isV2 =
        data.backupType === 'learning_apps_backup' &&
        data.version >= 2 &&
        data.apps &&
        typeof data.apps === 'object';

      // 旧v1形式も一応受け付ける
      const isV1 =
        data.backupType === 'learning_apps_backup' &&
        data.version === 1;

      if (!isV2 && !isV1) {
        throw new Error('形式が異なります');
      }

    } catch {
      showRestoreMessage(
        '❌ 復元に失敗しました。正しいバックアップファイルか確認してください。',
        'error'
      );
      event.target.value = '';
      return;
    }

    showRestoreConfirm(data);
    event.target.value = '';
  };

  reader.readAsText(file);
}

let _pendingRestoreData = null;

function showRestoreConfirm(data) {
  _pendingRestoreData = data;

  const box = document.getElementById('restore-confirm-box');
  if (!box) return;

  box.style.display = 'block';
  box.innerHTML = `
    <div style="font-size:13px;color:var(--red-t);margin-bottom:8px">
      ⚠️ バックアップを復元します。<br>
      共通ポイントを復元し、現在のアプリの記録だけを反映します。<br>
      他アプリの記録はバックアップ保管庫に保持されます。
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="doRestore()"
        style="flex:1;padding:8px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">
        復元する
      </button>
      <button onclick="cancelRestore()"
        style="flex:1;padding:8px;background:#eee;color:#555;border:none;border-radius:8px;font-size:13px;cursor:pointer">
        キャンセル
      </button>
    </div>`;
}

function doRestore() {
  const data = _pendingRestoreData;
  if (!data) return;

  // v1バックアップをv2風に変換
  let archive = data;

  if (data.version === 1) {
    archive = {
      backupType : 'learning_apps_backup',
      version    : 2,
      exportedAt : data.exportedAt || new Date().toISOString(),
      shared     : data.shared || {},
      apps       : data.apps || {}
    };
  }

  // 1. バックアップ全体を保管庫に保存
  if (typeof storeImportedBackupArchive === 'function') {
    storeImportedBackupArchive(archive);
  }

  // 2. 共通ポイントを復元
  if (
    archive.shared &&
    typeof archive.shared.points === 'number' &&
    typeof savePoints === 'function'
  ) {
    savePoints(archive.shared.points);
  }

  // 3. 現在開いているアプリの記録・重点問題だけ復元
  if (typeof restoreCurrentAppDataFromArchive === 'function') {
    restoreCurrentAppDataFromArchive();
  } else {
    const appData = archive.apps?.[APP_CONFIG.appId];

    if (appData) {
      if (Array.isArray(appData.records)) {
        saveRecords(appData.records);
      }

      if (Array.isArray(appData.focus)) {
        saveFocus(appData.focus);
      }

      if (Array.isArray(appData.wrong) && typeof saveWrongItems === 'function') {
        saveWrongItems(appData.wrong);
      }
    }
  }

  _pendingRestoreData = null;

  showRestoreMessage('✅ 復元が完了しました。', 'success');
  onRestoreComplete();
}

function cancelRestore() {
  _pendingRestoreData = null;

  const box = document.getElementById('restore-confirm-box');
  if (box) box.style.display = 'none';
}

function showRestoreMessage(msg, type) {
  const box = document.getElementById('restore-confirm-box');
  if (!box) return;

  const color = type === 'success' ? 'var(--green)' : 'var(--red-t)';

  box.style.display = 'block';
  box.innerHTML = `
    <div style="font-size:13px;color:${color};text-align:center">
      ${msg}
    </div>`;

  setTimeout(() => {
    box.style.display = 'none';
  }, 3000);
}

function onRestoreComplete() {
  totalPoints = loadPoints();

  renderFocusTags();
  renderSettingPoints();
  renderPrintPreview();

  if (typeof startSession === 'function') {
    startSession();
  }
}

/* ================================================
   print.js インライン（v1）
   依存: records.js
   ================================================ */
function renderPrintPreview() {
  const area     = document.getElementById('print-area'); if (!area) return;
  const dateFrom = document.getElementById('print-date-from')?.value || '';
  let records    = loadRecords();
  if (dateFrom) {
    records = records.filter(r => {
      const rd = r.date ? r.date.replace(/\//g, '-').slice(0, 10) : '';
      return rd >= dateFrom;
    });
  }
  if (!records.length) {
    area.innerHTML = '<div class="print-empty">表示できる記録がありません</div>'; return;
  }
  area.innerHTML = records.map(r => {
    const wordsHtml = (r.words?.length)
      ? `<div class="print-card-label">出題された問題</div>
         <div class="print-card-words">${r.words.join('・')}</div>` : '';
    const wrongHtml = (r.wrong?.length)
      ? `<div class="print-card-label">間違えた問題</div>
         <div class="print-card-wrong">${r.wrong.map(w =>
           `<span class="print-card-wrong-item">${w.ans}（${w.yomi}）</span>`
         ).join('')}</div>` : '';
    return `<div class="print-card">
      <div class="print-card-date">${r.date || ''}</div>
      <div class="print-card-row">
        <div class="print-card-score">${r.pct}%</div>
        <div class="print-card-count">${r.score} / ${r.total} 問正解</div>
      </div>
      ${wordsHtml}${wrongHtml}
    </div>`;
  }).join('');
}

function printRecords()   { renderPrintPreview(); window.print(); }
function clearDateFilter(){ document.getElementById('print-date-from').value = ''; renderPrintPreview(); }

/* ================================================
   アプリ本体
   ================================================ */

// ---- グローバル状態 ----
let jukugoData   = [];
let jukugoSchema = [];   // jukugo.json の schema配列
let filterKeys   = [];   // schemaから作る絞り込み項目
let kanjiData    = [];   // kanji.json の data配列
let gradeData    = [];   // gradejson.json の data配列
let kanjiGradeMap = {};  // { 漢字: grade_code } — 起動時に1回構築
//let okuriganaData = [];  // okurigana.json の data配列 [{word,kanji,answer,choices},...]

let questions    = [];
let qIdx         = 0;
let sessionScore = 0;
let sessionWrong = [];
let sessionCount = 0;
let checked      = false;

const SETTING_KEY = `${APP_CONFIG.appId}_setting`;
//let setting = { count: 10, hint: true, ratio: 'all', filters: {}, gradeLimit: null };
let setting = {
  count: 10,
  hint: true,
  ratio: 'all',
  filters: {},
  selectedGrades: [] // 空配列は「全て」を意味する
};

// ---- 起動 ----
async function init() {
  // 設定復元
  try { const sv = localStorage.getItem(SETTING_KEY); if (sv) Object.assign(setting, JSON.parse(sv)); } catch {}
  normalizeSelectedGrades();

  // データ読み込み（並行 fetch）
  try {
      const [jukugoRes, kanjiRes, gradeRes] = await Promise.all([
      fetch(APP_CONFIG.dataFile),
      fetch('../../data/kanji.json'),
      fetch('../../data/gradejson.json'),
    ]);

const jukugoJson = await jukugoRes.json();
jukugoData   = jukugoJson.data || [];
jukugoSchema = jukugoJson.schema || [];
filterKeys   = jukugoSchema.slice(4);

kanjiData  = (await kanjiRes.json()).data  || [];
gradeData  = (await gradeRes.json()).data  || [];

/* okurigana.json排除
      const [jukugoRes, kanjiRes, gradeRes, okuriRes] = await Promise.all([
      fetch(APP_CONFIG.dataFile),
      fetch('../../data/kanji.json'),
      fetch('../../data/gradejson.json'),
      fetch('../../data/okurigana.json'),
    ]);
    jukugoData    = (await jukugoRes.json()).data || [];
    kanjiData     = (await kanjiRes.json()).data  || [];
    gradeData     = (await gradeRes.json()).data  || [];
    okuriganaData = (await okuriRes.json()).data  || [];
*/
  } catch {
    document.getElementById('quiz-loading').textContent =
      'データの読み込みに失敗しました。';
    return;
  }

  // kanjiGradeMap を構築: 同じ漢字が複数行あるので grade_order が最小のもの（最も早く習う学年）を採用
  const gradeOrder = {};
  for (const r of gradeData) gradeOrder[r[3]] = r[0]; // { grade_code: grade_order }
  for (const row of kanjiData) {
    const kanji = row[0], code = row[2];
    if (!kanjiGradeMap[kanji] || gradeOrder[code] < gradeOrder[kanjiGradeMap[kanji]]) {
      kanjiGradeMap[kanji] = code;
    }
  }

  JukugoChoice.init({ kanjiData, gradeData, kanjiGradeMap });

  buildGradeFilterUI();
  buildFilterUI();
  applySettingUI();
  renderFocusTags();
  renderSettingPoints();
  startSession();
}

// ---- 出題範囲フィルターUI（複数選択）----
function getAllGradeCodes() {
  return gradeData.map(r => r[3]); // 'E1','E2',...,'H'
}

function normalizeSelectedGrades() {
  if (!Array.isArray(setting.selectedGrades)) {
    setting.selectedGrades = [];
  }

  const allCodes = ['E1','E2','E3','E4','E5','E6','J1','J2','J3','H'];

  // 旧データで全学年が保存されている場合は、onyomi と同じ「空配列＝全て」に寄せる。
  if (allCodes.every(code => setting.selectedGrades.includes(code))) {
    setting.selectedGrades = [];
  }

  // 以前の単一選択用設定が残っていても、今回の複数選択では使わない。
  setting.gradeLimit = null;
}

function buildGradeFilterUI() {
  const row = document.getElementById('grade-filter-row');
  if (!row) return;

  normalizeSelectedGrades();
  row.innerHTML = '';

  const selected = new Set(setting.selectedGrades);
  const allBtn = document.createElement('button');
  allBtn.className = 'filter-btn' + (selected.size === 0 ? ' active' : '');
  allBtn.textContent = '全て';
  allBtn.onclick = () => {
    setting.selectedGrades = [];
    saveSetting();
    resetAndRestartByGrade();
  };
  row.appendChild(allBtn);

  for (const gd of gradeData) {
    const code  = gd[3]; // 'E1','E2',...,'H'
    const label = gd[2]; // '小1','小2',...,'高校'

    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (selected.has(code) ? ' active' : '');
    btn.dataset.grade = code;
    btn.textContent = label;
    btn.onclick = () => toggleGradeFilter(code);
    row.appendChild(btn);
  }

  updateSelectedGradeLabel();
}

function toggleGradeFilter(code) {
  normalizeSelectedGrades();

  const selected = new Set(setting.selectedGrades);
  if (selected.has(code)) {
    selected.delete(code);
  } else {
    selected.add(code);
  }

  setting.selectedGrades = [...selected];

  // 全学年を個別に選んだ場合は「全て」と同じ扱いにする。
  const allCodes = getAllGradeCodes();
  if (allCodes.length > 0 && allCodes.every(c => setting.selectedGrades.includes(c))) {
    setting.selectedGrades = [];
  }

  saveSetting();
  resetAndRestartByGrade();
}

function updateSelectedGradeLabel() {
  const label = document.getElementById('selected-label');
  if (!label) return;

  const selected = new Set(setting.selectedGrades);
  if (selected.size === 0) {
    label.textContent = '選択中：すべて';
    return;
  }

  const names = gradeData
    .filter(r => selected.has(r[3]))
    .map(r => r[2]);

  label.textContent = names.length
    ? '選択中：' + names.join('、')
    : '選択中：なし';
}

function resetAndRestartByGrade() {
  sessionScore = 0;
  sessionWrong = [];
  qIdx = 0;
  questions = [];
  checked = false;

  buildGradeFilterUI();
  startSession();
}

// ---- 絞り込みフィルターUI（jukugo.json の schema から動的生成）----
function schemaIndex(key) {
  return jukugoSchema.indexOf(key);
}

function formatFilterValue(key, value) {
  const formatter = APP_CONFIG.filterFormatters?.[key];
  return formatter ? formatter(value, gradeData) : String(value);
}

function sortFilterValues(key, values) {
  const sorter = APP_CONFIG.filterSorters?.[key];
  if (sorter) return [...values].sort((a, b) => sorter(a, b, gradeData));

  return [...values].sort((a, b) => {
    const na = Number(a);
    const nb = Number(b);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return String(a).localeCompare(String(b), 'ja');
  });
}

function getSavedFilterValues(key) {
  const v = setting.filters?.[key];

  if (!v) return [];

  if (Array.isArray(v)) {
    return v.map(String);
  }

  return [String(v)];
}

function buildFilterRows() {
  const container = document.getElementById('filter-rows');
  if (!container) return;

  container.innerHTML = "";

  if (!filterKeys.length) {
    container.innerHTML =
      '<div style="font-size:12px;color:var(--faint)">絞り込み項目はありません</div>';
    return;
  }

  filterKeys.forEach(key => {
    const label = APP_CONFIG.filterLabels?.[key] ?? key;
    const row = document.createElement('div');
    row.className = 'filter-row';
    row.innerHTML = `
      <label>${label}</label>
      <select id="filter-${key}" multiple size="1">
      </select>
    `;
    container.appendChild(row);
  });
}

function rebuildSelect(key, values, selectedValues) {
  const sel = document.getElementById(`filter-${key}`);
  if (!sel) return;

  sel.innerHTML = "";

  sortFilterValues(key, values).forEach(v => {
    const opt = document.createElement('option');
    opt.value = String(v);
    opt.textContent = formatFilterValue(key, v);

    if (selectedValues.includes(String(v))) {
      opt.selected = true;
    }

    sel.appendChild(opt);
  });
}

function updateFilterOptions() {
  filterKeys.forEach(key => {
    const idx = schemaIndex(key);
    if (idx < 0) return;

    const values = [
      ...new Set(
        jukugoData
          .map(r => r[idx])
          .filter(v => v !== undefined && v !== null && v !== "")
      )
    ];

    const selectedValues = getSavedFilterValues(key);
    rebuildSelect(key, values, selectedValues);
  });
}
function buildFilterOptions() {
  updateFilterOptions();

  filterKeys.forEach(key => {
    const sel = document.getElementById(`filter-${key}`);
    if (!sel) return;

    sel.addEventListener('change', () => {
      const selectedValues = [...sel.selectedOptions].map(opt => opt.value);

      if (!setting.filters) setting.filters = {};

      if (selectedValues.length === 0) {
        delete setting.filters[key];
      } else {
        setting.filters[key] = selectedValues;
      }

      saveSetting();
      startSession();
    });
  });
}

function buildFilterUI() {
  buildFilterRows();
  buildFilterOptions();
}

function resetFilters() {
  setting.filters = {};
  saveSetting();
  buildFilterUI();
}

function applyCurrentFilters(rows) {
  return rows.filter(row => {
    return filterKeys.every(key => {
      const selectedValues = getSavedFilterValues(key);

      if (!selectedValues.length) return true;

      const idx = schemaIndex(key);
      if (idx < 0) return true;

      return selectedValues.includes(String(row[idx]));
    });
  });
}

// ---- 出題プール生成 ----
function buildPool() {
  let pool = jukugoData.slice();

  // 出題範囲フィルター（複数選択）
  // setting.selectedGrades が空なら「全て」。選択がある場合は、その学年の漢字だけで構成される熟語を残す。
  normalizeSelectedGrades();
  if (Array.isArray(setting.selectedGrades) && setting.selectedGrades.length > 0) {
    const selected = new Set(setting.selectedGrades);
    pool = pool.filter(row =>
      row[3].every(([k]) => {
        const kg = kanjiGradeMap[k];
        return kg && selected.has(kg);
      })
    );
  }

  // jukugo.json の schema から作った絞り込み
  pool = applyCurrentFilters(pool);

  return pool;
}

// okurigana.json の各エントリに choices が含まれているのでそのまま使う
// { word, kanji, answer, choices } — choices は [正解, ...不正解] の配列

// word + kanji をキーに O(1) で引けるマップ（buildQuestions 前に構築）

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}



// ---- セッション開始 ----
function startSession() {
  const pool = buildPool();
  if (!pool.length) {
    document.getElementById('quiz-loading').style.display  = 'block';
    document.getElementById('quiz-loading').textContent    = '出題できる熟語がありません。設定で絞り込みを確認してください。';
    document.getElementById('quiz-main').style.display     = 'none';
    return;
  }
  questions    = buildQuestions(pool, setting);
  qIdx         = 0;
  sessionScore = 0;
  sessionWrong = [];
  document.getElementById('quiz-loading').style.display = 'none';
  document.getElementById('quiz-main').style.display    = 'block';
  renderQuestion();
}

// ---- 問題描画 ----
function renderQuestion() {
  const q = questions[qIdx];
  checked = false;

updateQuizHeader();
document.getElementById('progress').style.width = `${(qIdx / questions.length) * 100}%`;

  const hintHtml = setting.hint
    ? `<div class="hint-text">${escHtml(q.mean)}</div>`
    : `<div class="hint-text"></div>`;

  // スロットIDの採番:
  //   漢字スロット i     → "k{i}"
  //   送り仮名スロット i  → "o{i}"
  let panelsHtml = '';
  const multiWord = q.slots.length > 1;

  q.slots.forEach((sl, i) => {
    const labelHtml = '';

    // 漢字パネル（6択）
const kanjiChoices = JukugoChoice.generateChoices(
  sl.kanji,
  sl.stem,
  setting.selectedGrades
);

    const kanjiGridHtml = kanjiChoices.map(c =>
      `<div class="choice" data-kanji="${escHtml(c)}" data-slot="k${i}"
            onclick="selChoice(this,'k${i}')"><span>${escHtml(c)}</span></div>`
    ).join('');

    // 送り仮名パネル（okurigana.json に choices がある場合のみ追加）
    let okuriPanelHtml = '';
    if (sl.hasOkuri && sl.choices) {
      const okuriGridHtml = sl.choices.map(o =>
        `<div class="choice choice-okuri" data-okuri="${escHtml(o)}" data-slot="o${i}"
              onclick="selChoice(this,'o${i}')"><span>${escHtml(o)}</span></div>`
      ).join('');
      okuriPanelHtml = `
        <div class="panel-label">送り仮名</div>
        <div class="choices choices-okuri" id="choices-o${i}">${okuriGridHtml}</div>`;
    }

    panelsHtml += `<div class="panel-block" id="panel-${i}">
      ${labelHtml}
      <div class="choices" id="choices-k${i}">${kanjiGridHtml}</div>
      ${okuriPanelHtml}
    </div>`;
  });

  document.getElementById('quiz-wrap').innerHTML = `
    <div class="q-card">
      <div class="q-label">この熟語を漢字で書け</div>
      <div class="reading">${escHtml(q.yomi)}</div>
      ${hintHtml}
    </div>
    <div class="panels-wrap">${panelsHtml}</div>
    <div class="result-box result-ng" id="result-ng" style="display:none">
      <span class="result-kanji" id="kanji-ng"></span>
      <span class="result-yomi"  id="yomi-ng"></span>
      <span class="next-hint">タップで次へ</span>
      <div class="next-overlay" onclick="nextQ()"></div>
    </div>
    <div class="result-box result-ok" id="result-ok" style="display:none">
      <span class="result-kanji" id="kanji-ok"></span>
      <span class="result-yomi"  id="yomi-ok"></span>
      <span class="next-hint">タップで次へ</span>
      <div class="next-overlay" onclick="nextQ()"></div>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="checkAnswer()" disabled>答え合わせ</button>
    <button class="retry-btn"  id="retry-btn"  style="display:none" onclick="retryQ()">もう一度チャレンジ</button>`;

  updateSubmitState();
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selChoice(btn, slot) {
  if (checked) return;
  document.querySelectorAll(`#choices-${slot} .choice`).forEach(b => {
    b.classList.remove('sel'); b.querySelector('.mark')?.remove();
  });
  btn.classList.add('sel');
  btn.insertAdjacentHTML('beforeend', '<span class="mark">✓</span>');
  updateSubmitState();
}

function updateSubmitState() {
  const q = questions[qIdx];
  // 全スロット（漢字 k{i} ＋ 送り仮名 o{i}）が選択済みか確認
  const allSelected = q.slots.every((sl, i) => {
    const kanjiOk = !!document.querySelector(`#choices-k${i} .choice.sel`);
    const okuriOk = !sl.hasOkuri || !!document.querySelector(`#choices-o${i} .choice.sel`);
    return kanjiOk && okuriOk;
  });
  const btn = document.getElementById('submit-btn');
  if (btn) btn.disabled = !allSelected;
}

// ---- 選択した答えを1つの語として組み立てる ----
function buildSelectedWord(q) {
  if (!q || !Array.isArray(q.slots)) return '';

  return q.slots.map((sl, i) => {
    const kanjiSel = document.querySelector(`#choices-k${i} .choice.sel`);
    const okuriSel = document.querySelector(`#choices-o${i} .choice.sel`);

    const selectedKanji = kanjiSel?.dataset.kanji || '';
    const selectedOkuri = sl.hasOkuri
      ? (okuriSel?.dataset.okuri || '')
      : '';

    return `${selectedKanji}${selectedOkuri}`;
  }).join('');
}


// ---- 答え合わせ ----
function checkAnswer() {
  if (checked) return;

  const q = questions[qIdx];
  const wrongWord = buildSelectedWord(q);

  checked = true;
  let correct = true;

  q.slots.forEach((sl, i) => {
    // 漢字スロット
    const kanjiSel = document.querySelector(`#choices-k${i} .choice.sel`);
    const kanjiOk  = kanjiSel?.dataset.kanji === sl.kanji;

    if (!kanjiOk) correct = false;

    document.querySelectorAll(`#choices-k${i} .choice`).forEach(b => {
      const isCorrect  = b.dataset.kanji === sl.kanji;
      const isSelected = b.classList.contains('sel');

      b.querySelector('.mark')?.remove();
      b.classList.remove('sel', 'ok', 'ng');

      if (isCorrect) {
        b.classList.add('ok');
        b.insertAdjacentHTML('beforeend', '<span class="mark">✓</span>');
      } else if (isSelected) {
        b.classList.add('ng');
        b.insertAdjacentHTML('beforeend', '<span class="mark">✗</span>');
      }
    });

    // 送り仮名スロット
    if (sl.hasOkuri) {
      const okuriSel = document.querySelector(`#choices-o${i} .choice.sel`);
      const okuriOk  = okuriSel?.dataset.okuri === sl.okuri;

      if (!okuriOk) correct = false;

      document.querySelectorAll(`#choices-o${i} .choice`).forEach(b => {
        const isCorrect  = b.dataset.okuri === sl.okuri;
        const isSelected = b.classList.contains('sel');

        b.querySelector('.mark')?.remove();
        b.classList.remove('sel', 'ok', 'ng');

        if (isCorrect) {
          b.classList.add('ok');
          b.insertAdjacentHTML('beforeend', '<span class="mark">✓</span>');
        } else if (isSelected) {
          b.classList.add('ng');
          b.insertAdjacentHTML('beforeend', '<span class="mark">✗</span>');
        }
      });
    }
  });

  document.getElementById('submit-btn').style.display = 'none';

  if (correct) {
    sessionScore++;

    document.getElementById('kanji-ok').textContent = q.word;
    document.getElementById('yomi-ok') .textContent = q.yomi;
    document.getElementById('result-ok').style.display = 'flex';
    document.getElementById('retry-btn').style.display = 'none';

  } else {
    sessionWrong.push({
      ans: q.word,
      yomi: q.yomi,
      wrongWord: wrongWord
    });

    if (typeof addWrongItem === 'function') {
      addWrongItem({
        word: q.word,
        yomi: q.yomi,
        wrongWord: wrongWord
      });
    }

    document.getElementById('kanji-ng').textContent = q.word;
    document.getElementById('yomi-ng') .textContent = q.yomi;
    document.getElementById('result-ng').style.display = 'flex';
    document.getElementById('retry-btn').style.display = 'block';
  }
}

function retryQ() {
  renderQuestion();
}


function nextQ() {
  qIdx++;
  if (qIdx >= questions.length) endSession();
  else                          renderQuestion();
}

if (pr) pr.textContent = rank.label;

const ss = document.getElementById('session-disp');
if (ss) ss.textContent = `${sessionCount}回目`;

document.getElementById('progress').style.width = '100%';

  const wrongHtml = sessionWrong.length
    ? `<div class="wrong-list">
         <div class="wrong-title">間違えた問題</div>
         <div class="session-wrong-items">
           ${sessionWrong.map(w =>

  document.getElementById('quiz-wrap').innerHTML = `

      <div class="rec-date">${r.date || ''}</div>
      <div class="rec-row">
        <span class="rec-pct">${r.pct}%</span>
        <span class="rec-count">${r.score} / ${r.total} 問正解</span>
      </div>
      ${wordsHtml}${wrongHtml}
    </div>`;
  }).join('');
}

// ---- タブ切り替え ----
function showPage(id, btn) {
  document.querySelectorAll('.page')   .forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id)?.classList.add('active');
  btn?.classList.add('active');
  if (id === 'record')  {
    renderPrintPreview();
    showSubTab('print', document.querySelector('#page-record .sub-tab'));
  }
  if (id === 'setting') { renderSettingPoints(); }
}

function showSubTab(id, btn) {
  ['list', 'print', 'delete'].forEach(s => {
    const el = document.getElementById('sub-' + s);
    if (el) el.style.display = s === id ? 'block' : 'none';
  });
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  if (id === 'print') renderPrintPreview();
}

function cancelDelete() {
  showSubTab('print', document.querySelector('#page-record .sub-tab'));
}

function execClearRecords() {
  clearRecords();
  renderPrintPreview();
  showSubTab('print', document.querySelector('#page-record .sub-tab'));
}

// ---- 起動 ----
init();
</script>
</body>
</html>
